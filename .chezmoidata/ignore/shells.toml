[ignore.shells.shared_posix.paths]
core = [
    ".config/shell/shrc"
]

extras = [
    ".config/shell/shrc.d/",
    ".config/shell/shrc.d/**",
]

[ignore.shells.bash.paths]
core = [
    ".bashrc"
]
extras = [
    ".config/bashrc.d/",
    ".config/bashrc.d/**",
    ".config/shell/bashrc.d/",
    ".config/shell/bashrc.d/**",
]

[ignore.shells.zsh.paths]
core = [
    ".zshrc",
]

extras = [
    ".config/zshrc.d/",
    ".config/zshrc.d/**",
    ".config/shell/zshrc.d/",
    ".config/shell/zshrc.d/**",
]


[ignore.shells.fish.paths]
core = [
    ".config/fish/",
    ".config/fish/config.fish",
]

extras = [
    ".config/fish/completions/",
    ".config/fish/completions/**",

    ".config/fish/conf.d/",
    ".config/fish/conf.d/**",

    ".config/fish/functions/",
    ".config/fish/functions/**",

    ".config/fish/themes/",
    ".config/fish/themes/**",

    ".config/fish/executable_config.fish",
    ".config/fish/executable_fish_variables",
    ".config/fish/fish_plugins",
    ".config/fish/fish_variables",
]