[alias]
lg1 = lg1-specific --all
lg2 = lg2-specific --all
lg3 = lg3-specific --all

lg1-specific = lg -l 1
lg2-specific = log --graph --abbrev-commit --decorate --format=format:'%C(bold blue)%h%C(reset) - %C(bold cyan)%aD%C(reset) %C(bold green)(%ar)%C(reset)%C(auto)%d%C(reset)%n''          %C(white)%s%C(reset) %C(dim white)- %an%C(reset)'
lg3-specific = log --graph --abbrev-commit --decorate --format=format:'%C(bold blue)%h%C(reset) - %C(bold cyan)%aD%C(reset) %C(bold green)(%ar)%C(reset) %C(bold cyan)(committed: %cD)%C(reset) %C(auto)%d%C(reset)%n''          %C(white)%s%C(reset)%n''          %C(dim white)- %an <%ae> %C(reset) %C(dim white)(committer: %cn <%ce>)%C(reset)'

filelog = log -u
st = status -s

sl = stash list
sa = stash apply
ss = stash save
sd = stash drop

cane = commit --amend --no-edit
caane = commit -a --amend --no-edit
cm = commit -m
cam = commit -am

co = checkout
cob = checkout -b
cot = checkout tests
com = checkout main
cod = checkout dev

pullff = pull --ff-only
pullr = pull --rebase
pullrr = pull --rebase --autostash
pulla = pull --autostash
pullne = pull --no-edit

unstage = reset HEAD
diffc = diff --cached
menff = merge --no-ff
aap = add * -p

publish = "!git push -u origin $(git rev-parse --abbrev-ref HEAD)"
unpublish = "!git push origin :$(git rev-parse --abbrev-ref HEAD)"

merge-span = "!f() { echo $(git log -1 $2 --merges --pretty=format:%P | cut -d' ' -f1)$1$(git log -1 $2 --merges --pretty=format:%P | cut -d' ' -f2); }; f"
merge-log = "!git log $(git merge-span .. $1)"
merge-diff = "!git diff $(git merge-span ... $1)"
merge-difftool = "!git difftool $(git merge-span ... $1)"

# External commands
wip = !sh ~/.config/git/commands.d/wip.sh
lg = !sh ~/.config/git/commands.d/lg.sh
branch-name = !sh ~/.config/git/commands.d/branch-name.sh
